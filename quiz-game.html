<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --primary:#FF6B35;--gold:#FFD700;--gold-dark:#FFA500;
  --success:#4ADE80;--danger:#FF4757;
  --purple:#A855F7;--blue:#60A5FA;--pink:#F472B6;--cyan:#22D3EE;--orange:#FB923C;
  --green:#34D399;--red:#F87171;
}
html,body{height:100%;overflow:hidden;background:#0f0a1e}
body{font-family:-apple-system,"PingFang SC","Hiragino Sans GB",sans-serif;color:#fff;touch-action:manipulation;user-select:none}
#root{width:100%;height:100%;max-width:var(--container-w,430px);margin:0 auto;position:relative;overflow:hidden}

/* ====== 地图视图 ====== */
#map-view{position:absolute;inset:0;overflow:hidden;transition:opacity .4s}
#map-view.hidden{opacity:0;pointer-events:none}

/* 背景层 */
.map-bg-layer{position:fixed;top:0;left:50%;transform:translateX(-50%);width:var(--container-w,430px);height:100%;z-index:0;pointer-events:none}
.map-bg-img{width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0;opacity:0.8}
.map-bg-mask{position:absolute;inset:0;background:linear-gradient(180deg,rgba(15,10,30,0.3) 0%,rgba(15,10,30,0.5) 50%,rgba(15,10,30,0.85) 100%);z-index:1}

/* 滚动层 */
.map-scroll{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;z-index:1;-webkit-overflow-scrolling:touch}
.map-scroll::-webkit-scrollbar{display:none}
.map-content{position:relative;min-height:1400px;padding:0 0 120px}

/* HUD顶栏 - 毛玻璃效果 */
.hud{position:sticky;top:0;z-index:20;display:flex;align-items:center;justify-content:space-between;padding:8px 14px;
  background:rgba(15,10,30,0.7);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.hud-left{display:flex;align-items:center;gap:8px}
.hud-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#FF6B35,#FFD700);display:flex;align-items:center;justify-content:center;font-size:18px;border:2px solid rgba(255,215,0,0.6)}
.hud-name{font-size:13px;font-weight:600}
.hud-title{font-size:10px;color:var(--gold);opacity:0.8}
.hud-right{display:flex;gap:6px}
.hud-pill{display:flex;align-items:center;gap:3px;background:rgba(255,255,255,0.12);padding:5px 10px;border-radius:16px;font-size:12px;font-weight:600;backdrop-filter:blur(4px)}
.hud-pill.gold{color:#FFE55C}
.hud-pill.purple{color:#C4B5FD}

/* 商城引力Tab */
.shop-teaser{position:sticky;top:50px;z-index:19;margin:6px 12px;display:flex;align-items:center;gap:10px;overflow-x:auto;padding:0;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch}
.shop-teaser::-webkit-scrollbar{display:none}
.st-item{flex-shrink:0;scroll-snap-align:start;display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:20px;
  background:rgba(255,255,255,0.1);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,0.15);cursor:pointer;transition:all .2s;min-width:120px;white-space:nowrap}
.st-item:active{transform:scale(0.95);background:rgba(255,255,255,0.18)}
.st-item.hot{border-color:rgba(255,107,53,0.5);background:rgba(255,107,53,0.15)}
.st-item.new{border-color:rgba(168,85,247,0.5);background:rgba(168,85,247,0.15)}
.st-item .sti-icon{font-size:22px;flex-shrink:0}
.st-item .sti-info{display:flex;flex-direction:column;gap:1px}
.st-item .sti-name{font-size:11px;font-weight:700;line-height:1.2}
.st-item .sti-price{font-size:9px;color:var(--gold);opacity:0.8}
.st-hot-tag{position:absolute;top:-6px;right:-6px;background:linear-gradient(135deg,#FF4757,#FF6B35);color:#fff;font-size:8px;padding:2px 5px;border-radius:6px;font-weight:700}

/* 标题区 */
.map-hero{text-align:center;padding:20px 20px 24px;position:relative;z-index:2}
.map-hero h1{font-size:22px;font-weight:800;background:linear-gradient(135deg,#FFD700,#FF6B35,#FFD700);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-shadow:none;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.3))}
.map-hero p{font-size:12px;color:rgba(255,255,255,0.6);margin-top:4px}
.streak-badge{display:inline-flex;align-items:center;gap:4px;margin-top:8px;background:rgba(255,107,53,0.15);border:1px solid rgba(255,107,53,0.3);padding:4px 12px;border-radius:16px;font-size:11px;color:var(--primary)}

/* SVG路径 */
.path-svg{position:absolute;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}

/* 关卡节点 */
.nodes-container{position:relative;z-index:2;padding-top:20px}
.node-wrapper{position:absolute;display:flex;flex-direction:column;align-items:center;cursor:pointer;transition:transform .2s}
.node-wrapper:active{transform:scale(0.92)}
.node-circle{width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;position:relative;transition:all .3s}
.node-circle::after{content:'';position:absolute;inset:-4px;border-radius:50%;border:2px solid transparent;transition:all .3s}
.node-wrapper.unlocked .node-circle{background:linear-gradient(135deg,#FF6B35,#FF8F6B);box-shadow:0 4px 20px rgba(255,107,53,0.5)}
.node-wrapper.unlocked .node-circle::after{border-color:rgba(255,107,53,0.4);animation:ringPulse 2s infinite}
.node-wrapper.completed .node-circle{background:linear-gradient(135deg,#10B981,#4ADE80);box-shadow:0 4px 16px rgba(74,222,128,0.4)}
.node-wrapper.completed .node-circle::after{border-color:rgba(74,222,128,0.3)}
.node-wrapper.boss .node-circle{width:70px;height:70px;font-size:30px;background:linear-gradient(135deg,#F59E0B,#FFD700);box-shadow:0 4px 24px rgba(255,215,0,0.5)}
.node-wrapper.boss .node-circle::after{border-color:rgba(255,215,0,0.4);animation:ringPulse 1.5s infinite}
.node-wrapper.locked .node-circle{background:rgba(255,255,255,0.06);border:2px dashed rgba(255,255,255,0.15)}
.node-wrapper.locked{opacity:0.45;cursor:not-allowed}
@keyframes ringPulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.12);opacity:0.5}}

.node-label{margin-top:6px;font-size:11px;font-weight:500;color:rgba(255,255,255,0.7);text-align:center;max-width:72px}
.node-stars{display:flex;gap:1px;margin-top:2px;font-size:12px}
.node-stars .empty{opacity:0.2}

/* 场景装饰 */
.deco{position:absolute;font-size:20px;opacity:0.4;animation:decoFloat 5s ease-in-out infinite;pointer-events:none;z-index:1}
@keyframes decoFloat{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-8px) rotate(5deg)}}

/* 商城按钮 */
.shop-fab{position:fixed;bottom:24px;right:24px;z-index:100;width:52px;height:52px;border-radius:50%;
  background:linear-gradient(135deg,var(--purple),var(--pink));border:none;font-size:22px;
  box-shadow:0 4px 20px rgba(168,85,247,0.5);cursor:pointer;display:flex;align-items:center;justify-content:center;
  animation:fabBounce 3s ease-in-out infinite}
@keyframes fabBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}

/* ====== 答题视图（游戏化RPG风格） ====== */
#quiz-view{position:absolute;inset:0;z-index:50;display:flex;flex-direction:column;transition:opacity .3s,transform .3s}
#quiz-view.hidden{opacity:0;pointer-events:none;transform:translateY(20px)}

/* 答题背景图层 */
.quiz-bg-layer{position:absolute;inset:0;z-index:0}
.quiz-bg-img{width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0}
.quiz-bg-mask{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,0.3) 0%,rgba(0,0,0,0.6) 60%,rgba(0,0,0,0.85) 100%);z-index:1}

/* 顶部HUD */
.quiz-hud{position:relative;z-index:2;padding:10px 14px;display:flex;align-items:center;gap:8px;
  background:rgba(0,0,0,0.3);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.quiz-back-btn{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.quiz-back-btn:active{transform:scale(0.9)}
.quiz-title{flex:1;font-size:14px;font-weight:700;text-shadow:0 1px 4px rgba(0,0,0,0.5)}
.quiz-score-pill{display:flex;align-items:center;gap:3px;font-size:12px;color:#FFE55C;font-weight:700;background:rgba(255,215,0,0.15);padding:4px 10px;border-radius:12px}

/* 状态行 */
.quiz-stats{position:relative;z-index:2;display:flex;align-items:center;justify-content:space-between;padding:4px 14px}
.hearts-bar{display:flex;gap:2px}
.heart-icon{font-size:16px;transition:all .3s;filter:drop-shadow(0 1px 2px rgba(0,0,0,0.3))}
.heart-icon.lost{opacity:0.2;transform:scale(0.8)}
.combo-tag{background:linear-gradient(135deg,#FF6B35,#F59E0B);padding:3px 10px;border-radius:10px;font-size:11px;font-weight:700;opacity:0;transform:scale(0.5);transition:all .3s;box-shadow:0 2px 8px rgba(255,107,53,0.4)}
.combo-tag.show{opacity:1;transform:scale(1)}
.q-num{font-size:11px;color:rgba(255,255,255,0.5)}

/* 进度+计时 */
.quiz-bars{position:relative;z-index:2;padding:6px 14px 0}
.progress-track{height:6px;background:rgba(255,255,255,0.08);border-radius:3px;overflow:hidden;margin-bottom:4px}
.progress-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--blue),var(--purple),var(--pink));transition:width .4s}
.timer-track{height:4px;background:rgba(255,255,255,0.05);border-radius:2px;overflow:hidden}
.timer-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--success),var(--gold),var(--danger));transition:width .1s linear}

/* ====== 游戏化题目区 ====== */
.quiz-body{position:relative;z-index:2;flex:1;overflow-y:auto;padding:8px 14px 12px;-webkit-overflow-scrolling:touch;display:flex;flex-direction:column;gap:10px}
.quiz-body::-webkit-scrollbar{display:none}

/* NPC对话气泡式题目 */
.q-npc-area{display:flex;gap:10px;align-items:flex-start;animation:npcPopIn .5s cubic-bezier(.34,1.56,.64,1)}
@keyframes npcPopIn{from{opacity:0;transform:translateY(-20px) scale(0.9)}to{opacity:1;transform:translateY(0) scale(1)}}
.q-npc-avatar{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#FFD700,#FF6B35);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;border:2px solid rgba(255,215,0,0.5);box-shadow:0 2px 12px rgba(0,0,0,0.3);animation:npcBob 2s ease-in-out infinite}
@keyframes npcBob{0%,100%{transform:rotate(-3deg)}50%{transform:rotate(3deg)}}
.q-bubble{flex:1;background:rgba(255,255,255,0.1);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,0.18);border-radius:18px;border-top-left-radius:4px;padding:12px 14px;position:relative;
  box-shadow:0 4px 20px rgba(0,0,0,0.2)}
.q-bubble::before{content:'';position:absolute;left:-8px;top:14px;width:0;height:0;
  border-top:8px solid transparent;border-bottom:8px solid transparent;border-right:8px solid rgba(255,255,255,0.18)}
.q-dim-badge{display:inline-flex;align-items:center;gap:4px;font-size:9px;padding:2px 8px;border-radius:8px;margin-bottom:6px}
.q-dim-badge.dim-知识{background:rgba(96,165,250,0.2);color:#93C5FD}
.q-dim-badge.dim-理解{background:rgba(52,211,153,0.2);color:#6EE7B7}
.q-dim-badge.dim-评鉴{background:rgba(168,85,247,0.2);color:#C4B5FD}
.q-dim-badge.dim-创意{background:rgba(251,146,60,0.2);color:#FED7AA}
.q-dim-badge.dim-价值{background:rgba(244,114,182,0.2);color:#F9A8D4}
.q-stem{font-size:14px;line-height:1.65;font-weight:500;color:#fff}

/* ====== 游戏化选项 ====== */
.opts-list{display:grid;grid-template-columns:1fr 1fr;gap:8px;animation:optsFadeIn .4s ease .2s both}
@keyframes optsFadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.opt-btn{display:flex;flex-direction:column;align-items:center;gap:6px;padding:12px 8px;
  background:rgba(255,255,255,0.06);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
  border:1.5px solid rgba(255,255,255,0.12);border-radius:16px;cursor:pointer;transition:all .2s;font-size:12px;line-height:1.4;text-align:center;
  position:relative;overflow:hidden}
.opt-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.05),transparent);pointer-events:none}
.opt-btn:active:not(.disabled){transform:scale(0.95);background:rgba(255,255,255,0.12)}
.opt-btn .opt-emoji{font-size:28px;line-height:1}
.opt-btn .opt-text{font-size:11px;font-weight:500;color:rgba(255,255,255,0.9)}
.opt-btn.correct{border-color:var(--success);background:rgba(74,222,128,0.15);animation:correctPop .4s ease;box-shadow:0 0 20px rgba(74,222,128,0.3)}
.opt-btn.wrong{border-color:var(--danger);background:rgba(255,71,87,0.1);animation:shake .4s}
.opt-btn.disabled{pointer-events:none;opacity:0.4}
.opt-btn.reveal-correct{border-color:var(--success);background:rgba(74,222,128,0.08)}
@keyframes correctPop{0%{transform:scale(1)}30%{transform:scale(1.04)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-4px)}40%{transform:translateX(4px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}

/* 拖拽排序 — 卡片堆叠风格 */
.drag-zone{display:flex;flex-direction:column;gap:6px;animation:optsFadeIn .4s ease .2s both}
.drag-row{display:flex;align-items:center;gap:8px;padding:10px 12px;
  background:rgba(255,255,255,0.06);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
  border:1.5px solid rgba(255,255,255,0.12);border-radius:14px;font-size:12px;cursor:grab;transition:all .15s}
.drag-row:active{cursor:grabbing;border-color:var(--cyan);background:rgba(34,211,238,0.1);transform:scale(1.02)}
.drag-row .drag-idx{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,var(--cyan),var(--blue));display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;color:#000}
.drag-row .drag-arrows{display:flex;flex-direction:column;gap:0;margin-left:auto;font-size:9px;opacity:0.5;line-height:1}
.drag-row .drag-arrows span{cursor:pointer;padding:2px 6px;border-radius:4px}
.drag-row .drag-arrows span:active{background:rgba(255,255,255,0.15);opacity:1}

/* 连线配对 — 宝箱配对风格 */
.match-zone{display:flex;gap:10px;animation:optsFadeIn .4s ease .2s both}
.match-col{flex:1;display:flex;flex-direction:column;gap:6px}
.match-pill{padding:10px 8px;
  background:rgba(255,255,255,0.06);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
  border:1.5px solid rgba(255,255,255,0.12);border-radius:14px;font-size:11px;text-align:center;cursor:pointer;transition:all .15s;line-height:1.4}
.match-pill:active{transform:scale(0.96)}
.match-pill.selected{border-color:var(--cyan);background:rgba(34,211,238,0.15);box-shadow:0 0 16px rgba(34,211,238,0.25)}
.match-pill.paired{border-color:var(--success);background:rgba(74,222,128,0.1);opacity:0.5;pointer-events:none}

/* 确认按钮 */
.submit-btn{margin-top:10px;padding:12px;width:100%;border:none;border-radius:14px;font-size:14px;font-weight:600;cursor:pointer;color:#fff;transition:all .15s;box-shadow:0 4px 16px rgba(0,0,0,0.2)}
.submit-btn:active{transform:scale(0.97)}
.submit-btn.cyan{background:linear-gradient(135deg,#22D3EE,#60A5FA)}
.submit-btn.purple{background:linear-gradient(135deg,#A855F7,#F472B6)}

/* 解析框 — 卷轴风格 */
.explain-area{margin-top:8px;padding:12px 14px;border-radius:14px;font-size:12px;line-height:1.7;display:none;animation:slideUp .3s;
  background:rgba(0,0,0,0.3);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  border:1px solid rgba(255,215,0,0.2)}
.explain-area.show{display:block}
.explain-area.good{border-color:rgba(74,222,128,0.3);color:#86EFAC}
.explain-area.bad{border-color:rgba(255,71,87,0.3);color:#FCA5A5}
@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* 下一题按钮 */
.next-btn{position:relative;z-index:2;margin:10px 14px 20px;padding:14px;border:none;border-radius:16px;
  background:linear-gradient(135deg,var(--primary),#FF8F6B);color:#fff;font-size:15px;font-weight:700;
  cursor:pointer;display:none;box-shadow:0 4px 20px rgba(255,107,53,0.4);letter-spacing:1px}
.next-btn.show{display:block;animation:slideUp .3s}
.next-btn:active{transform:scale(0.97);opacity:0.9}

/* ====== 全屏反馈 ====== */
.feedback-screen{position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;opacity:0;transition:opacity .2s}
.feedback-screen.show{opacity:1}
.fb-emoji{font-size:64px;animation:fbPop .5s cubic-bezier(.34,1.56,.64,1)}
@keyframes fbPop{0%{transform:scale(0) rotate(-15deg)}60%{transform:scale(1.2) rotate(3deg)}100%{transform:scale(1) rotate(0)}}
.fb-text{font-size:18px;font-weight:700;margin-top:8px;text-shadow:0 2px 8px rgba(0,0,0,0.5)}
.fb-score{font-size:13px;margin-top:4px;font-weight:600}

/* 金币飞 */
.coin-particle{position:fixed;z-index:199;font-size:18px;pointer-events:none;animation:coinUp .9s ease-out forwards}
@keyframes coinUp{0%{opacity:1;transform:translateY(0) scale(1)}40%{opacity:1;transform:translateY(-50px) scale(1.3)}100%{opacity:0;transform:translateY(-100px) scale(0.4)}}

/* 撒花 */
.confetti-piece{position:fixed;z-index:198;pointer-events:none;border-radius:2px;animation:confDrop 1.4s ease-out forwards}
@keyframes confDrop{0%{opacity:1;transform:translateY(0) rotate(0deg) scale(1)}100%{opacity:0;transform:translateY(90vh) rotate(600deg) scale(0.3)}}

/* 连击爆炸 */
.combo-burst{position:fixed;top:50%;left:50%;z-index:201;font-size:32px;font-weight:900;pointer-events:none;
  transform:translate(-50%,-50%);animation:burstAnim .8s ease-out forwards;
  background:linear-gradient(135deg,#FFD700,#FF6B35);-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  text-shadow:none;filter:drop-shadow(0 2px 8px rgba(255,107,53,0.5))}
@keyframes burstAnim{0%{opacity:0;transform:translate(-50%,-50%) scale(0.3)}30%{opacity:1;transform:translate(-50%,-50%) scale(1.4)}100%{opacity:0;transform:translate(-50%,-60%) scale(0.8)}}

/* ====== 结算视图 ====== */
#result-view{position:absolute;inset:0;z-index:60;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;
  background:radial-gradient(ellipse at 50% 30%,rgba(99,102,241,0.15),transparent 60%),#0f0a1e;transition:opacity .3s}
#result-view.hidden{opacity:0;pointer-events:none}
.res-emoji{font-size:72px;animation:fbPop .6s cubic-bezier(.34,1.56,.64,1)}
.res-title{font-size:22px;font-weight:800;margin:12px 0 4px}
.res-sub{font-size:13px;color:rgba(255,255,255,0.5)}
.res-stars{font-size:32px;margin:16px 0;letter-spacing:4px}
.res-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;width:100%;margin:16px 0}
.res-cell{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:14px 6px;text-align:center}
.res-cell .rv{font-size:20px;font-weight:700;background:linear-gradient(135deg,var(--gold),var(--primary));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.res-cell .rl{font-size:10px;color:rgba(255,255,255,0.4);margin-top:3px}
.res-rewards{width:100%;background:rgba(255,215,0,0.06);border:1px solid rgba(255,215,0,0.15);border-radius:14px;padding:14px;margin:16px 0}
.res-rewards h4{font-size:12px;color:var(--gold);margin-bottom:8px}
.rw-list{display:flex;flex-wrap:wrap;gap:6px}
.rw-tag{font-size:11px;background:rgba(255,215,0,0.1);padding:3px 10px;border-radius:8px;color:var(--gold)}
.res-btns{width:100%;display:flex;flex-direction:column;gap:10px;margin-top:16px}
.res-btns button{padding:14px;border:none;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer}
.btn-fire{background:linear-gradient(135deg,var(--primary),#FF8F6B);color:#fff;box-shadow:0 4px 16px rgba(255,107,53,0.3)}
.btn-dim{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);color:#fff}

/* ====== 商城视图 ====== */
#shop-view{position:absolute;inset:0;z-index:70;background:#0f0a1e;overflow-y:auto;transition:opacity .3s}
#shop-view.hidden{opacity:0;pointer-events:none}
#shop-view::-webkit-scrollbar{display:none}
.shop-hdr{display:flex;align-items:center;padding:14px 16px;gap:10px}
.shop-hdr button{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,0.1);border:none;color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.shop-hdr h2{flex:1;font-size:17px;font-weight:700}
.shop-bal{font-size:13px;color:var(--gold);font-weight:600}
.shop-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 16px 40px}
.shop-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:16px 10px;text-align:center;cursor:pointer;transition:all .15s;position:relative}
.shop-card:active{transform:scale(0.96)}
.shop-card .sc-icon{font-size:32px;margin-bottom:6px}
.shop-card .sc-name{font-size:12px;font-weight:600;margin-bottom:3px}
.shop-card .sc-desc{font-size:10px;color:rgba(255,255,255,0.4);margin-bottom:8px;line-height:1.3}
.shop-card .sc-price{display:inline-flex;align-items:center;gap:3px;font-size:11px;color:var(--gold);font-weight:600;background:rgba(255,215,0,0.1);padding:3px 10px;border-radius:8px}
.shop-card.owned{opacity:0.6;border-color:var(--success)}
.shop-card.owned .sc-price{color:var(--success)}
.shop-card .st-hot-tag{position:absolute;top:-6px;right:4px;background:linear-gradient(135deg,#FF4757,#FF6B35);color:#fff;font-size:8px;padding:2px 6px;border-radius:6px;font-weight:700;z-index:1}

/* Toast */
.toast{position:fixed;top:70px;left:50%;transform:translateX(-50%) translateY(-10px);z-index:300;
  background:rgba(0,0,0,0.88);backdrop-filter:blur(8px);padding:10px 20px;border-radius:20px;
  font-size:12px;font-weight:500;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

// 错误兜底：把 onerror / unhandledrejection 写到 console + sendBeacon
(function(){
  try{
    window.addEventListener('error', function(e){
      try{ if(navigator.sendBeacon) navigator.sendBeacon('/xes-log', new Blob([JSON.stringify({page:'quiz-game',ts:Date.now(),msg:(e&&e.message)||'error',ua:(navigator.userAgent||'').slice(0,200)})],{type:'application/json'})); }catch(_){}
    }, true);
    window.addEventListener('unhandledrejection', function(e){
      try{ var r=e&&e.reason; if(navigator.sendBeacon) navigator.sendBeacon('/xes-log', new Blob([JSON.stringify({page:'quiz-game',ts:Date.now(),msg:(r&&r.message)||String(r),ua:(navigator.userAgent||'').slice(0,200)})],{type:'application/json'})); }catch(_){}
    });
  }catch(_){}
})();
// 外部题库预加载(按书目动态引入，同步写入确保在主脚本前加载)
(function(){
  // 白名单：与 quiz-data-*.js 实际存在的文件保持同步，未知 book 自动回落 xiyou
  var WHITELIST = ['xiyou','shuihu','sanguo','honglou','andersen','ailisi','dadi','daocaoren','datouerzi','eluosi','feizhou','gelin','huichen','jierjia','kleilov','lafengdan','lubinxun','meitounao','minjian','oulu','qier','qisehua','renlei','shanhaijing','shenbi','shenhua','shiwan','tangmu','tongnian','tongyao_xia','waitou','xiangfei','xila','yiqi','yisuo','yuanwang','yulai','yuyan','aidejiaoyu'];
  var raw = (new URLSearchParams(window.location.search).get('book') || 'xiyou').trim();
  // 仅允许字母数字下划线，防注入
  if(!/^[a-z0-9_]+$/i.test(raw) || WHITELIST.indexOf(raw) < 0){
    try{ console.warn('[quiz-game] unknown book='+raw+', fallback xiyou'); }catch(_){}
    window.__quizBookFallback = raw;
    raw = 'xiyou';
  }
  window.__quizBook = raw;
  document.write('<scr'+'ipt src="quiz-data-' + raw + '.js" onerror="window.__quizDataMissing=true"><\/scr'+'ipt>');
})();
</script>

// ============ V12 · 书目专属背景图生成器（无需外部图片，按 scenes.colors+emojis 即时合成）============
function _bkSeed(s){let h=2166136261;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619);}return ()=>{h=Math.imul(h^(h>>>15),2246822507);h=Math.imul(h^(h>>>13),3266489909);h^=h>>>16;return ((h>>>0)/0xffffffff);};}
function _bkSvgScene(scene, opts){
  const w=opts.w||1600,h=opts.h||900,boss=!!opts.boss,levelName=opts.levelName||'';
  const c=scene.colors||['#1a0a2e','#3d2b0a','#6b4c11'];
  const c0=c[0],c1=c[1]||c[0],c2=c[2]||c[1]||c[0];
  const emojis=(scene.emojis&&scene.emojis.length?scene.emojis:['✨','⭐','☁️']);
  const rand=_bkSeed(scene.name+'|'+(boss?'B':'S')+'|'+levelName);
  let glows='';
  for(let i=0;i<4;i++){
    const cx=Math.round(rand()*w),cy=Math.round(rand()*h),rr=Math.round(120+rand()*260);
    glows+=`<circle cx="${cx}" cy="${cy}" r="${rr}" fill="url(#g${i})" opacity="${(0.25+rand()*0.25).toFixed(2)}"/>`;
  }
  let nodes='';
  const N=boss?10:18;
  for(let i=0;i<N;i++){
    const e=emojis[i%emojis.length];
    const x=30+Math.round(rand()*(w-60));
    const y=70+Math.round(rand()*(h-160));
    const sz=Math.round((boss?42:36)+rand()*(boss?44:50));
    const op=(0.40+rand()*0.45).toFixed(2);
    const rot=Math.round(-12+rand()*24);
    nodes+=`<text x="${x}" y="${y}" font-size="${sz}" opacity="${op}" transform="rotate(${rot} ${x} ${y})">${e}</text>`;
  }
  const bossOverlay=boss?`<rect width="${w}" height="${h}" fill="rgba(180,30,30,0.18)"/>
    <radialGradient id="bossGlow"><stop offset="0%" stop-color="#FF4757" stop-opacity="0.55"/><stop offset="100%" stop-color="#FF4757" stop-opacity="0"/></radialGradient>
    <circle cx="${Math.round(w/2)}" cy="${Math.round(h*0.45)}" r="${Math.round(Math.min(w,h)*0.45)}" fill="url(#bossGlow)"/>
    <text x="${Math.round(w/2)}" y="${Math.round(h*0.18)}" text-anchor="middle" font-size="${boss?64:48}" font-weight="900" fill="#FFD700" stroke="#7c1d1d" stroke-width="2" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" letter-spacing="6">⚔ BOSS ⚔</text>`:'';
  const titleSize=Math.round(w/22);
  const subSize=Math.round(w/40);
  const sceneLabel=`<g>
    <rect x="${Math.round(w*0.04)}" y="${h-Math.round(titleSize*2.2)}" rx="14" ry="14" width="${Math.round(w*0.42)}" height="${Math.round(titleSize*1.6)}" fill="rgba(0,0,0,0.45)"/>
    <text x="${Math.round(w*0.07)}" y="${h-Math.round(titleSize*0.9)}" font-size="${titleSize}" font-weight="700" fill="#fff" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">${scene.name}${levelName?'·'+levelName:''}</text>
  </g>`;
  const svg=`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${w} ${h}" width="${w}" height="${h}" preserveAspectRatio="xMidYMid slice">
    <defs>
      <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${c0}"/>
        <stop offset="55%" stop-color="${c1}"/>
        <stop offset="100%" stop-color="${c2}"/>
      </linearGradient>
      <radialGradient id="g0"><stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.7"/><stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/></radialGradient>
      <radialGradient id="g1"><stop offset="0%" stop-color="${c1}" stop-opacity="0.9"/><stop offset="100%" stop-color="${c1}" stop-opacity="0"/></radialGradient>
      <radialGradient id="g2"><stop offset="0%" stop-color="${c2}" stop-opacity="0.9"/><stop offset="100%" stop-color="${c2}" stop-opacity="0"/></radialGradient>
      <radialGradient id="g3"><stop offset="0%" stop-color="#FFD700" stop-opacity="0.55"/><stop offset="100%" stop-color="#FFD700" stop-opacity="0"/></radialGradient>
    </defs>
    <rect width="${w}" height="${h}" fill="url(#bg)"/>
    ${glows}
    ${nodes}
    ${bossOverlay}
    ${sceneLabel}
  </svg>`;
  return 'data:image/svg+xml;charset=utf-8,'+encodeURIComponent(svg);
}
function _bkSvgMap(book, w, h){
  const scenes=book.scenes||[];
  const colors=(book.themeColors||['#2B7DE9','#7C3AED']);
  const rand=_bkSeed('map-'+book.title);
  // 4 scenes 横向并排 + 顶部标题
  let cols='';
  scenes.forEach((s,i)=>{
    const cx=(w/scenes.length)*i+w/(scenes.length*2);
    const sc=s.colors||[colors[0],colors[1]||colors[0],colors[1]||colors[0]];
    cols+=`<g>
      <rect x="${(w/scenes.length)*i}" y="0" width="${w/scenes.length}" height="${h}" fill="url(#bgM${i})"/>
      ${(s.emojis||[]).slice(0,5).map((e,k)=>{
        const x=cx+(rand()-0.5)*(w/scenes.length*0.7);
        const y=120+rand()*(h-200);
        const sz=Math.round(40+rand()*48);
        return `<text x="${Math.round(x)}" y="${Math.round(y)}" font-size="${sz}" opacity="${(0.45+rand()*0.4).toFixed(2)}">${e}</text>`;
      }).join('')}
      <text x="${Math.round(cx)}" y="${h-50}" text-anchor="middle" font-size="${Math.round(w/40)}" font-weight="700" fill="#fff" opacity="0.95" font-family="-apple-system,'PingFang SC',sans-serif">${s.name}</text>
    </g>`;
  });
  const grads=scenes.map((s,i)=>{
    const sc=s.colors||[colors[0],colors[1]||colors[0],colors[1]||colors[0]];
    return `<linearGradient id="bgM${i}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${sc[0]}"/><stop offset="100%" stop-color="${sc[2]||sc[1]||sc[0]}"/></linearGradient>`;
  }).join('');
  const svg=`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${w} ${h}" width="${w}" height="${h}" preserveAspectRatio="xMidYMid slice">
    <defs>${grads}<linearGradient id="topGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="rgba(0,0,0,0.55)"/><stop offset="100%" stop-color="rgba(0,0,0,0)"/></linearGradient></defs>
    ${cols}
    <rect width="${w}" height="160" fill="url(#topGrad)"/>
    <text x="${Math.round(w/2)}" y="80" text-anchor="middle" font-size="${Math.round(w/22)}" font-weight="800" fill="#FFD700" stroke="rgba(0,0,0,0.6)" stroke-width="2" font-family="-apple-system,'PingFang SC',sans-serif" letter-spacing="8">${book.title}·${book.subtitle||'阅读大冒险'}</text>
  </svg>`;
  return 'data:image/svg+xml;charset=utf-8,'+encodeURIComponent(svg);
}

      <div class="map-bg-mask"></div>
    </div>`;

  // SVG路径连接线（响应式宽高）
  const CW = getContainerW();
  const positions = getNodePos();
  const mapH = positions[positions.length-1].y + 200;
  let pathD='';
  positions.forEach((p,i)=>{
    const x=p.x/100*CW, y=p.y;
    if(i===0) pathD+=`M${x},${y}`;
    else{
      const prev=positions[i-1];
      const px=prev.x/100*CW, py=prev.y;
      const cy1=py+(y-py)*0.5, cy2=py+(y-py)*0.5;
      pathD+=` C${px},${cy1} ${x},${cy2} ${x},${y}`;
    }
  });

  // 横版模式不渲染竖向SVG路径
  let pathSvg = '';
  if(!isLandscape){
    pathSvg=`<svg class="path-svg" viewBox="0 0 ${CW} ${mapH}" preserveAspectRatio="xMidYMin meet" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="path-grad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="rgba(255,107,53,0.6)"/>
          <stop offset="100%" stop-color="rgba(168,85,247,0.4)"/>
        </linearGradient>
        <filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      </defs>
      <path d="${pathD}" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="6" stroke-linecap="round"/>
      <path d="${pathD}" fill="none" stroke="url(#path-grad)" stroke-width="3" stroke-linecap="round" stroke-dasharray="8 6" filter="url(#glow)">
        <animate attributeName="stroke-dashoffset" from="0" to="-28" dur="2s" repeatCount="indefinite"/>
      </path>
    </svg>`;
  }

  // 节点
  let nodesHtml='';
  LEVELS.forEach((lv,i)=>{
    const ls=S.levels[lv.id]||{};
    const unlocked=i===0||(S.levels[LEVELS[i-1].id]&&S.levels[LEVELS[i-1].id].done);
    let cls='locked';
    if(ls.done) cls='completed';
    else if(unlocked) cls='unlocked';
    if(lv.type==='boss'&&cls!=='locked') cls+=' boss';

    const pos=positions[i];
    const stars=ls.stars||0;
    const starsHtml=ls.done?'<div class="node-stars">'+'\u2B50'.repeat(stars)+'<span class="empty">'+'\u2B50'.repeat(3-stars)+'</span></div>':'';

    // 横版模式下不设 left/top（CSS flex 控制），竖版仍用绝对定位
    const posStyle = isLandscape ? '' : `style="left:calc(${pos.x}% - ${lv.type==='boss'?35:30}px);top:${pos.y}px"`;

    nodesHtml+=`<div class="node-wrapper ${cls}" ${posStyle} onclick="clickNode(${lv.id},${unlocked||ls.done?1:0})">
      <div class="node-circle">${ls.done?'\u2705':(cls.includes('locked')?'\u{1F512}':lv.icon)}</div>
      <div class="node-label">${lv.name}</div>${starsHtml}
    </div>`;
  });

  // 装饰（横版模式下不渲染，CSS也隐藏了）
  let decoHtml='';
  if(!isLandscape){
    for(let i=0;i<12;i++){
      const emoji=sc.emojis[i%sc.emojis.length];
      const x=10+Math.random()*80, y=80+Math.random()*1100;
      const delay=(Math.random()*3).toFixed(1);
      const size=14+Math.floor(Math.random()*12);
      decoHtml+=`<div class="deco" style="left:${x}%;top:${y}px;font-size:${size}px;animation-delay:${delay}s;opacity:${(0.2+Math.random()*0.3).toFixed(2)}">${emoji}</div>`;
    }
  }

  const title=S.equipped.title?SHOP.find(x=>x.id===S.equipped.title)?.name:'阅读冒险家';

  // 商城Tab热门商品
  const hotItems=SHOP.filter(x=>x.hot||x.new).slice(0,4);
  let teaserHtml=hotItems.map(it=>{
    const owned=S.owned.includes(it.id);
    return `<div class="st-item ${it.hot?'hot':''} ${it.new?'new':''}" onclick="buy('${it.id}')" style="position:relative">
      <span class="sti-icon">${it.icon}</span>
      <span class="sti-info">
        <span class="sti-name">${owned?'✅ 已拥有':it.name}</span>
        <span class="sti-price">${owned?'已兑换':'\u{1FA99} '+it.price}</span>
      </span>
      ${it.hot?'<span class="st-hot-tag">热卖</span>':''}
      ${it.new?'<span class="st-hot-tag" style="background:linear-gradient(135deg,#A855F7,#C084FC)">新品</span>':''}
    </div>`;
  }).join('');

  document.getElementById('map-view').innerHTML=`
    ${bgLayer}
    <div class="map-scroll">
      <div class="hud">
        <div class="hud-left">
          <div class="hud-avatar">🐒</div>
          <div><div class="hud-name">小读者</div><div class="hud-title">${title}</div></div>
        </div>
        <div class="hud-right">
          <div class="hud-pill gold">🪙 ${S.coins}</div>
          <div class="hud-pill purple">⭐ ${S.stars}</div>
        </div>
      </div>
      <div class="shop-teaser">${teaserHtml}</div>
      <div class="map-hero">
        <h1>📖 ${BKCFG.title} · 阅读闯关</h1>
        <p>完成 ${completed}/12 关 · 中国青少年阅读素养框架</p>
        <div class="streak-badge">🔥 连续学习第 ${S.streak} 天</div>
      </div>
      <div class="map-content" ${isLandscape?'':'style="min-height:'+(mapH+100)+'px"'}>
        ${pathSvg}
        ${decoHtml}
        <div class="nodes-container">${nodesHtml}</div>
      </div>
    </div>
    <button class="shop-fab" onclick="openShop()">🛒</button>`;
  showV('map-view');
}

function getScene(){let mx=0;LEVELS.forEach((l,i)=>{if(S.levels[l.id]&&S.levels[l.id].done)mx=i});return LEVELS[Math.min(mx,11)].scene}
function clickNode(id,ok){if(!ok)return toast('🔒 通过前一关才能解锁哦！');startLevel(id)}

// ===== 答题引擎 =====
let CUR={lv:null,qs:[],idx:0,hearts:0,combo:0,score:0,correct:0,timer:null,timeLeft:0};
let matchSt={sel:null,pairs:[]};

function startLevel(id){
  ensureQBank();
  if(!QBANK[id]){
    toast('⏳ 题库加载中，请稍后再试...');
    // 延迟重试
    setTimeout(function(){ensureQBank();if(QBANK[id])startLevel(id);else toast('❌ 题库加载失败，请刷新页面');},800);
    return;
  }
  const lv=LEVELS.find(l=>l.id===id);
  CUR={lv,qs:[...QBANK[id]],idx:0,hearts:lv.type==='boss'?CFG.heartsBoss:CFG.heartsNormal,combo:0,score:0,correct:0,timer:null,timeLeft:0};
  matchSt={sel:null,pairs:[]};
  renderQ();showV('quiz-view');
}

function renderQ(){
  const q=CUR.qs[CUR.idx];
  const isBoss=CUR.lv.type==='boss';
  const total=CUR.qs.length;
  const pct=(CUR.idx/total*100).toFixed(1);
  // 背景图（Boss关用特殊背景，普通关用场景背景）
  let bgSrc=BOSS_BG[CUR.lv.id]||SCENE_BG[CUR.lv.scene];
  let qBg=`<div class="quiz-bg-layer">
    <img class="quiz-bg-img" src="${bgSrc}" alt="" onerror="this.style.opacity=0">
    <div class="quiz-bg-mask"></div>
  </div>`;

  let heartsH='';
  const maxH=isBoss?CFG.heartsBoss:CFG.heartsNormal;
  for(let i=0;i<maxH;i++) heartsH+=`<span class="heart-icon ${i>=CUR.hearts?'lost':''}">\u2764\uFE0F</span>`;
  const comboTxt=CUR.combo>=2?`\u{1F525}\u00D7${CFG.comboMult[Math.min(CUR.combo-1,4)]}`:'';

  // NPC头像（按维度分配）
  const npcEmoji=NPC_AVATAR[q.dim]||'\u{1F435}';
  const npcName=NPC_NAME[q.dim]||'\u795E\u79D8\u4EBA';

  let body='';
  if(q.type==='choice') body=mkChoice(q,CUR.lv.id);
  else if(q.type==='drag') body=mkDrag(q);
  else if(q.type==='match') body=mkMatch(q);

  document.getElementById('quiz-view').innerHTML=`
    ${qBg}
    <div class="quiz-hud">
      <button class="quiz-back-btn" onclick="exitQ()">\u2190</button>
      <span class="quiz-title">${CUR.lv.icon} ${CUR.lv.name}</span>
      <span class="quiz-score-pill">🪙 +${CUR.score}</span>
    </div>
    <div class="quiz-stats">
      <div class="hearts-bar">${heartsH}</div>
      <span class="combo-tag ${CUR.combo>=2?'show':''}">${comboTxt}</span>
      <span class="q-num">${CUR.idx+1}/${total}</span>
    </div>
    <div class="quiz-bars">
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="timer-track"><div class="timer-fill" id="tmr" style="width:100%"></div></div>
    </div>
    <div class="quiz-body">
      <div class="q-npc-area">
        <div class="q-npc-avatar">${npcEmoji}</div>
        <div class="q-bubble">
          <span class="q-dim-badge dim-${q.dim}">${dimIcon(q.dim)} ${q.dim}</span>
          <div class="q-stem">${q.stem}</div>
        </div>
      </div>
      ${body}
      <div class="explain-area" id="expArea"></div>
    </div>
    <button class="next-btn" id="nxtBtn" onclick="nextQ()">\u{1F449} 继续前进</button>`;

  startTimer(isBoss?CFG.timerBoss:CFG.timerNormal);
}

function dimIcon(d){return{'\u77E5\u8BC6':'\u{1F4D6}','\u7406\u89E3':'\u{1F9E0}','\u8BC4\u9274':'\u2696\uFE0F','\u521B\u610F':'\u{1F3A8}','\u4EF7\u503C':'\u{1F31F}'}[d]||'\u2728'}

// 选择题 — 游戏化卡片网格（2x2 emoji卡片）
function mkChoice(q,lvId){
  const emojis=OPT_EMOJIS[(lvId-1)%OPT_EMOJIS.length];
  return `<div class="opts-list">${q.opts.map((o,i)=>`<div class="opt-btn" id="op${i}" onclick="pickOpt(${i})">
    <span class="opt-emoji">${emojis[i%emojis.length]}</span>
    <span class="opt-text">${o}</span>
  </div>`).join('')}</div>`;
}
function pickOpt(i){
  clearInterval(CUR.timer);
  const q=CUR.qs[CUR.idx];
  document.querySelectorAll('.opt-btn').forEach(e=>e.classList.add('disabled'));
  if(i===q.ans){document.getElementById('op'+i).classList.add('correct');onCorrect(q)}
  else{document.getElementById('op'+i).classList.add('wrong');document.getElementById('op'+q.ans).classList.add('reveal-correct');onWrong(q)}
}

// 拖拽排序
function mkDrag(q){
  window._dItems=q.items.map((t,i)=>({t,i}));
  // 打乱
  for(let i=window._dItems.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[window._dItems[i],window._dItems[j]]=[window._dItems[j],window._dItems[i]]}
  window._dAns=q.ans;
  return `<div class="drag-zone" id="dragZ">${window._dItems.map((d,i)=>`<div class="drag-row" id="dr${i}">
    <span class="drag-idx">${i+1}</span><span class="drag-txt">${d.t}</span>
    <span class="drag-arrows"><span onclick="moveItem(${i},-1)">\u25B2</span><span onclick="moveItem(${i},1)">\u25BC</span></span>
  </div>`).join('')}<button class="submit-btn cyan" onclick="submitDrag()">\u2705 确认顺序</button></div>`;
}
function moveItem(i,dir){
  const j=i+dir;if(j<0||j>=window._dItems.length)return;
  [window._dItems[i],window._dItems[j]]=[window._dItems[j],window._dItems[i]];
  refreshDrag();
}
function refreshDrag(){
  window._dItems.forEach((d,i)=>{
    const el=document.getElementById('dr'+i);
    if(el){el.querySelector('.drag-idx').textContent=i+1;el.querySelector('.drag-txt').textContent=d.t}
  });
}
function submitDrag(){
  clearInterval(CUR.timer);
  const q=CUR.qs[CUR.idx];
  const user=window._dItems.map(d=>d.i);
  if(JSON.stringify(user)===JSON.stringify(window._dAns)) onCorrect(q);else onWrong(q);
}

// 连线配对
function mkMatch(q){
  matchSt={sel:null,pairs:[]};window._mQ=q;
  return `<div class="match-zone">
    <div class="match-col" id="mcL">${q.left.map((t,i)=>`<div class="match-pill" id="ml${i}" onclick="mSel('l',${i})">${t}</div>`).join('')}</div>
    <div class="match-col" id="mcR">${q.right.map((t,i)=>`<div class="match-pill" id="mr${i}" onclick="mSel('r',${i})">${t}</div>`).join('')}</div>
  </div><button class="submit-btn purple" id="mSub" style="display:none" onclick="submitMatch()">\u2705 确认配对</button>`;
}
function mSel(side,i){
  const el=document.getElementById((side==='l'?'ml':'mr')+i);
  if(el.classList.contains('paired'))return;
  if(side==='l'){
    document.querySelectorAll('#mcL .match-pill').forEach(e=>e.classList.remove('selected'));
    el.classList.add('selected');matchSt.sel=i;
  }else{
    if(matchSt.sel===null)return toast('\u{1F449} \u5148\u70B9\u5DE6\u8FB9');
    matchSt.pairs.push([matchSt.sel,i]);
    document.getElementById('ml'+matchSt.sel).classList.add('paired');
    el.classList.add('paired');
    document.querySelectorAll('#mcL .match-pill').forEach(e=>e.classList.remove('selected'));
    matchSt.sel=null;
    if(matchSt.pairs.length===window._mQ.left.length) document.getElementById('mSub').style.display='block';
  }
}
function submitMatch(){
  clearInterval(CUR.timer);
  const q=window._mQ;
  const ok=matchSt.pairs.every(p=>q.ans.some(a=>a[0]===p[0]&&a[1]===p[1]));
  if(ok) onCorrect(q);else onWrong(q);
}

// 计时器
function startTimer(s){
  clearInterval(CUR.timer);CUR.timeLeft=s;
  const el=document.getElementById('tmr');if(!el)return;
  CUR.timer=setInterval(()=>{
    CUR.timeLeft-=0.1;
    if(el)el.style.width=(CUR.timeLeft/s*100)+'%';
    if(CUR.timeLeft<=0){clearInterval(CUR.timer);onTimeout()}
  },100);
}
function onTimeout(){const q=CUR.qs[CUR.idx];onWrong(q)}

// ===== 答对/答错 =====
function onCorrect(q){
  CUR.combo++;if(CUR.combo>S.maxCombo)S.maxCombo=CUR.combo;
  const mult=CFG.comboMult[Math.min(CUR.combo-1,4)];
  const speed=CUR.timeLeft>8?CFG.speedBonus:0;
  const pts=Math.round((CFG.baseScore+speed)*mult);
  CUR.score+=pts;CUR.correct++;
  S.dimS[q.dim]=(S.dimS[q.dim]||0)+1;S.dimT[q.dim]=(S.dimT[q.dim]||0)+1;

  showFB(true,pts);
  spawnCoins(2+Math.min(CUR.combo,4));
  if(CUR.combo>=3){spawnConfetti();showComboBurst(CUR.combo)}
  showExp(q.exp,true);
  document.getElementById('nxtBtn').classList.add('show');
}
function onWrong(q){
  CUR.combo=0;CUR.hearts--;
  CUR.score=Math.max(0,CUR.score+CFG.wrongPenalty);
  S.dimT[q.dim]=(S.dimT[q.dim]||0)+1;
  showFB(false,CFG.wrongPenalty);
  showExp(q.exp,false);
  if(CUR.hearts<=0){setTimeout(()=>finishLv(false),1200);return}
  document.getElementById('nxtBtn').classList.add('show');
}

// ===== 反馈动效(Candy Crush风格) =====
function showFB(ok,pts){
  const fb=document.getElementById('feedback');
  const emojis=ok?['🎉','✨','🌟','💫','🎊']:['😅','💪','🤔','📚'];
  const e=emojis[Math.floor(Math.random()*emojis.length)];
  const words=ok?['太棒了！','答对啦！','厉害！','正确！✓','真聪明！']:['没关系~','加油哦！','再想想！','别灰心！'];
  const w=words[Math.floor(Math.random()*words.length)];
  fb.innerHTML=`<div class="fb-emoji">${e}</div><div class="fb-text" style="color:${ok?'#4ADE80':'#FCA5A5'}">${w}</div><div class="fb-score" style="color:${ok?'var(--gold)':'var(--red)'}">${pts>0?'+'+pts:pts} 积分</div>`;
  fb.classList.add('show');
  setTimeout(()=>fb.classList.remove('show'),1000);
}
function spawnCoins(n){
  for(let i=0;i<n;i++) setTimeout(()=>{
    const c=document.createElement('div');c.className='coin-particle';c.textContent='🪙';
    c.style.left=(25+Math.random()*50)+'%';c.style.top='45%';
    document.body.appendChild(c);setTimeout(()=>c.remove(),900);
  },i*80);
}
function spawnConfetti(){
  const colors=['#FF6B35','#FFD700','#4ADE80','#A855F7','#60A5FA','#F472B6','#22D3EE'];
  for(let i=0;i<24;i++) setTimeout(()=>{
    const c=document.createElement('div');c.className='confetti-piece';
    c.style.left=Math.random()*100+'%';c.style.top='-5px';
    c.style.background=colors[Math.floor(Math.random()*colors.length)];
    c.style.width=(5+Math.random()*5)+'px';c.style.height=(5+Math.random()*5)+'px';
    c.style.animationDuration=(1+Math.random()*0.8)+'s';
    document.body.appendChild(c);setTimeout(()=>c.remove(),1800);
  },i*40);
}
function showComboBurst(n){
  const b=document.createElement('div');b.className='combo-burst';
  b.textContent=`${n}连击！\u{1F525}`;
  document.body.appendChild(b);setTimeout(()=>b.remove(),900);
}
function showExp(txt,ok){
  const el=document.getElementById('expArea');if(!el)return;
  el.className='explain-area show '+(ok?'good':'bad');
  el.innerHTML='\u{1F4A1} '+txt;
}
function exitQ(){clearInterval(CUR.timer);renderMap()}

// ===== 下一题 =====
function nextQ(){
  CUR.idx++;
  if(CUR.idx>=CUR.qs.length) finishLv(true);
  else{matchSt={sel:null,pairs:[]};renderQ()}
}

// ===== 结算 =====
function finishLv(passed){
  clearInterval(CUR.timer);
  const total=CUR.qs.length;
  const acc=CUR.correct/total;
  let stars=0;if(acc>=1)stars=3;else if(acc>=0.8)stars=2;else if(acc>=0.6)stars=1;

  if(passed||acc>=0.6){
    const prev=S.levels[CUR.lv.id]||{};
    S.levels[CUR.lv.id]={done:true,stars:Math.max(prev.stars||0,stars),score:Math.max(prev.score||0,CUR.score)};
  }
  S.coins+=CUR.score;
  const bonus=(stars>=2?25:0)+(S.maxCombo>=3?15:0);
  S.coins+=bonus;
  S.stars=Object.values(S.levels).reduce((s,l)=>s+(l.stars||0),0);
  save();

  const rewards=[];
  if(CUR.score>0)rewards.push('🪙 +'+CUR.score+' 积分');
  if(stars>=2)rewards.push('✨ 优秀奖励 +25');
  if(S.maxCombo>=3)rewards.push('\u{1F525} 连击王 +15');

  document.getElementById('result-view').innerHTML=`
    <div class="res-emoji">${passed?'\u{1F3C6}':'\u{1F4AA}'}</div>
    <div class="res-title">${passed?'闯关成功！':'再来一次！'}</div>
    <div class="res-sub">${CUR.lv.icon} ${CUR.lv.name}</div>
    <div class="res-stars">${'\u2B50'.repeat(stars)}${'<span style="opacity:0.2">\u2B50</span>'.repeat(3-stars)}</div>
    <div class="res-grid">
      <div class="res-cell"><div class="rv">${Math.round(acc*100)}%</div><div class="rl">正确率</div></div>
      <div class="res-cell"><div class="rv">${CUR.score}</div><div class="rl">获得积分</div></div>
      <div class="res-cell"><div class="rv">${S.maxCombo}</div><div class="rl">最高连击</div></div>
    </div>
    ${rewards.length?`<div class="res-rewards"><h4>\u{1F381} 获得奖励</h4><div class="rw-list">${rewards.map(r=>`<span class="rw-tag">${r}</span>`).join('')}</div></div>`:''}
    <div class="res-btns">
      ${passed?`<button class="btn-fire" onclick="goNext()">继续冒险 \u{1F680}</button>`:`<button class="btn-fire" onclick="startLevel(${CUR.lv.id})">再试一次 \u{1F504}</button>`}
      <button class="btn-dim" onclick="renderMap()">返回地图</button>
    </div>`;
  showV('result-view');
  if(passed)spawnConfetti();
}
function goNext(){
  const idx=LEVELS.findIndex(l=>l.id===CUR.lv.id)+1;
  if(idx<LEVELS.length)startLevel(LEVELS[idx].id);else{renderMap();toast('\u{1F389} 恭喜通关！全部关卡完成！')}
}

// ===== 商城 =====
function openShop(){
  const titlst=['头像框','称号','道具','特效'];
  let shopHtml='';

  SHOP.forEach(it=>{

    groups[g].push(it);

    const grpName={frame:'头像框',title:'称号',badge:'道具',skin:'特效'}[g]||'其他';
    const grpIcon={frame:'🖼️',title:'👑',badge:'🎒',skin:'✨'}[g]||'📦';
    shopHtml+=`<div style="padding:16px 16px 4px;display:flex;align-items:center;gap:6px"><span style="font-size:16px">${grpIcon}</span><span style="font-size:13px;font-weight:700">${grpName}</span></div>`;
    shopHtml+=`<div class="shop-grid">${items.map(it=>{
      const owned=S.owned.includes(it.id);
      return`<div class="shop-card ${owned?'owned':''}" onclick="${owned?'':`buy('${it.id}')`}" style="position:relative">
        ${it.hot?'<span class="st-hot-tag">热卖</span>':''}${it.new?'<span class="st-hot-tag" style="background:linear-gradient(135deg,#A855F7,#C084FC)">新品</span>':''}
        <div class="sc-icon">${it.icon}</div><div class="sc-name">${it.name}</div>
        <div class="sc-desc">${it.desc}</div><div class="sc-price">${owned?'\u2705 已拥有':'\u{1FA99} '+it.price}</div>
      </div>`;
    }).join('')}</div>`;
  });
  document.getElementById('shop-view').innerHTML=`

function buy(id){
  const it=SHOP.find(x=>x.id===id);if(!it)return;
  if(S.coins<it.price)return toast('\u274C 积分不足，继续闯关攒积分！');
  S.coins-=it.price;S.owned.push(id);S.equipped[it.id.split('_')[0]]=id;save();
  toast(`\u{1F389} 成功兑换\u300C${it.name}\u300D\uFF01`);openShop();
}
